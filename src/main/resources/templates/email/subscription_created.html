<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Subscription Created</title></head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:'Segoe UI',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:40px 0;">
  <tr><td align="center">
    <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">
      <!-- Header -->
      <tr><td style="background:#4f46e5;padding:32px 40px;text-align:center;">
        <h1 style="color:#fff;margin:0;font-size:24px;font-weight:700;">CartWave</h1>
      </td></tr>
      <!-- Body -->
      <tr><td style="padding:40px;">
        <h2 style="margin:0 0 16px;color:#111827;font-size:20px;">Subscription Activated 🚀</h2>
        <p style="color:#6b7280;margin:0 0 24px;line-height:1.6;">
          Your <strong th:text="${planName}">CartWave</strong> subscription is now active. Welcome to a world of powerful commerce tools!
        </p>
        <div style="background:#f5f3ff;border:1px solid #ddd6fe;border-radius:8px;padding:20px;margin-bottom:24px;">
          <table width="100%" cellpadding="0" cellspacing="0">
            <tr>
              <td style="color:#374151;font-size:14px;padding-bottom:8px;"><strong>Plan:</strong></td>
              <td style="color:#4f46e5;font-size:14px;font-weight:600;padding-bottom:8px;text-align:right;" th:text="${planName}"></td>
            </tr>
            <tr>
              <td style="color:#374151;font-size:14px;padding-bottom:8px;"><strong>Billing Cycle:</strong></td>
              <td style="color:#374151;font-size:14px;padding-bottom:8px;text-align:right;" th:text="${billingCycle}"></td>
            </tr>
            <tr>
              <td style="color:#374151;font-size:14px;padding-bottom:8px;"><strong>Amount:</strong></td>
              <td style="color:#374151;font-size:14px;font-weight:600;padding-bottom:8px;text-align:right;" th:text="${currency + ' ' + amount}"></td>
            </tr>
            <tr>
              <td style="color:#374151;font-size:14px;"><strong>Next Renewal:</strong></td>
              <td style="color:#374151;font-size:14px;text-align:right;" th:text="${renewalDate}"></td>
            </tr>
          </table>
        </div>
        <div style="text-align:center;margin:24px 0;">
          <a th:href="${dashboardUrl}" href="#"
             style="display:inline-block;background:#4f46e5;color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:16px;">
            Explore Your Dashboard
          </a>
        </div>
      </td></tr>
      <!-- Footer -->
      <tr><td style="background:#f9fafb;padding:24px 40px;text-align:center;">
        <p style="margin:0;color:#9ca3af;font-size:12px;">© 2026 CartWave. All rights reserved. · Powered by CartWave</p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
