spring:
  application:
    name: cartwave-backend

  datasource:
    url: ${DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/cartwave}}
    username: ${DB_USERNAME:${DB_USER:cartwave}}
    password: ${DB_PASSWORD:}
    hikari:
      pool-name: CartWavePool
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT_MS:60000}
      minimum-idle: ${DB_MIN_IDLE:2}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      keepalive-time: ${DB_KEEPALIVE_MS:300000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from: ${MAIL_FROM:noreply@cartwave.store}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
          ssl:
            enable: ${SMTP_SSL:false}

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui/index.html

app:
  jwt-secret: ${JWT_SECRET:dev-secret-dev-secret-dev-secret-dev-secret}
  jwt-expiration-milliseconds: ${JWT_ACCESS_EXPIRATION_MS:900000}

jwt:
  secret: ${JWT_SECRET:dev-secret-dev-secret-dev-secret-dev-secret}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  region: ${AWS_REGION:eu-west-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:cartwave-assets}
    base-url: ${AWS_S3_BASE_URL:https://cartwave-assets.s3.eu-west-1.amazonaws.com}

cartwave:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  superadmin:
    email: ${SUPERADMIN_EMAIL:superadmin@cartwave.local}
    password: ${SUPERADMIN_PASSWORD:Password123!}
  jobs:
    email-dispatch-ms: ${JOB_EMAIL_DISPATCH_MS:30000}
    escrow-release-cron: ${JOB_ESCROW_RELEASE_CRON:0 */15 * * * *}
    subscription-expiration-cron: ${JOB_SUBSCRIPTION_EXPIRATION_CRON:0 0 * * * *}
    kpi-aggregation-cron: ${JOB_KPI_AGGREGATION_CRON:0 */30 * * * *}
    fraud-scan-cron: ${JOB_FRAUD_SCAN_CRON:0 */10 * * * *}
