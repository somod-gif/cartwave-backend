<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Reset Your Password</title></head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:'Segoe UI',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:40px 0;">
  <tr><td align="center">
    <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">
      <tr><td style="background:#4f46e5;padding:32px 40px;text-align:center;">
        <h1 style="color:#fff;margin:0;font-size:24px;font-weight:700;">CartWave</h1>
      </td></tr>
      <tr><td style="padding:40px;">
        <h2 style="margin:0 0 16px;color:#111827;font-size:20px;">Reset Your Password 🔐</h2>
        <p style="color:#6b7280;margin:0 0 24px;line-height:1.6;">
          You requested a password reset. Click the button below — this link expires in <strong>15 minutes</strong>.
        </p>
        <div style="text-align:center;margin:32px 0;">
          <a th:href="${resetLink}" href="#"
             style="background:#4f46e5;color:#fff;text-decoration:none;padding:14px 32px;border-radius:8px;font-size:16px;font-weight:600;display:inline-block;">
            Reset Password
          </a>
        </div>
        <p style="color:#9ca3af;font-size:13px;line-height:1.5;margin:0;">
          If you didn't request this, you can safely ignore this email. Your password will not change.
        </p>
      </td></tr>
      <tr><td style="background:#f9fafb;padding:24px 40px;text-align:center;">
        <p style="margin:0;color:#9ca3af;font-size:12px;">© 2026 CartWave. All rights reserved.</p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
