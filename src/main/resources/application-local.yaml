# ─── Local Development Profile ───────────────────────────────────────────────
# Run with:  ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# Or set env: SPRING_PROFILES_ACTIVE=local
#
# Uses H2 in-memory DB so you don't need PostgreSQL or Docker locally.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:h2:mem:cartwave;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: false          # H2 doesn't need Flyway migrations

  jpa:
    hibernate:
      ddl-auto: create-drop # auto-create schema from entities
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true         # http://localhost:8080/h2-console
      path: /h2-console

  mail:
    host: localhost
    port: 1025              # MailHog / MailPit default

app:
  jwt-secret: local-dev-secret-local-dev-secret-local-dev-secret

jwt:
  secret: local-dev-secret-local-dev-secret-local-dev-secret

logging:
  level:
    com.cartwave: DEBUG
    org.hibernate.SQL: DEBUG
